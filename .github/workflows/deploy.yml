name: Deploy to cPanel (meta)

on:
  push:
    branches:
      - main

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync files to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}

          # Local source (your repo root here looks correct)
          local-dir: ./        # or ./meta/ if you keep files in a subfolder

          # Remote destination – MUST end with a /
          # Either hard-code:
          # server-dir: public_html/meta/
          # or, if you keep it in a secret, make sure the secret value is: public_html/meta/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}

          protocol: ftps

          # This is what makes old files disappear:
          dangerous-clean-slate: true

          # Don’t upload git / node_modules / workflow files / README
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            README.md
